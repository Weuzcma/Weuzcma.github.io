<svg viewBox="0 0 300 300" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="saturnGradient" cx="40%" cy="40%">
      <stop offset="0%" style="stop-color:#fde047;stop-opacity:1" />
      <stop offset="60%" style="stop-color:#eab308;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ca8a04;stop-opacity:1" />
    </radialGradient>
    <radialGradient id="saturnShine" cx="35%" cy="35%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:0.25" />
      <stop offset="100%" style="stop-color:#ffffff;stop-opacity:0" />
    </radialGradient>
  </defs>
  
  <!-- Rings (back) -->
  <ellipse cx="150" cy="150" rx="180" ry="45" fill="none" stroke="#a16207" stroke-width="8" opacity="0.4"/>
  <ellipse cx="150" cy="150" rx="165" ry="40" fill="none" stroke="#dc2626" stroke-width="3" opacity="0.3"/>
  
  <!-- Main planet sphere -->
  <circle cx="150" cy="150" r="110" fill="url(#saturnGradient)"/>
  
  <!-- Atmospheric bands -->
  <ellipse cx="150" cy="130" rx="110" ry="15" fill="#ca8a04" opacity="0.3"/>
  <ellipse cx="150" cy="170" rx="110" ry="12" fill="#b45309" opacity="0.4"/>
  <ellipse cx="150" cy="190" rx="110" ry="10" fill="#92400e" opacity="0.3"/>
  
  <!-- Rings (front) -->
  <ellipse cx="150" cy="150" rx="180" ry="45" fill="none" stroke="#b45309" stroke-width="10" opacity="0.7"/>
  <ellipse cx="150" cy="150" rx="170" ry="43" fill="none" stroke="#dc2626" stroke-width="2" opacity="0.5"/>
  
  <!-- Shine effect -->
  <circle cx="150" cy="150" r="110" fill="url(#saturnShine)"/>
</svg>